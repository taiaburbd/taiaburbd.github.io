<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <title>Page Not Found — Taiabur Rahman</title>
    <meta name="description" content="The page you were looking for could not be found on Taiabur Rahman's portfolio." />
    <link rel="icon" href="/images/icon.png" />
    <link rel="canonical" href="https://taiaburbd.github.io/" />
    <style>
      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #fff;
        color: #1e1e1e;
        margin: 0;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1rem;
      }
      .box { max-width: 480px; }
      h1 { font-size: 4rem; margin: 0; color: #0a508c; letter-spacing: 1px; }
      h2 { font-size: 1.25rem; margin: 0.5rem 0 1rem; color: #333; }
      p { color: #555; line-height: 1.5; }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        background: #0a508c;
        color: #fff;
        text-decoration: none;
        padding: 0.65rem 1.2rem;
        border-radius: 6px;
        font-weight: 600;
      }
      a:hover { background: #083d6e; }
    </style>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Redirects unknown URLs back into the SPA's history so React Router can resolve them.
      (function () {
        var pathSegmentsToKeep = 0;
        var l = window.location;
        // Only auto-redirect when the path looks like an SPA route (not a static file).
        if (!/\.[a-zA-Z0-9]{2,5}(\?|$)/.test(l.pathname)) {
          l.replace(
            l.protocol +
              '//' +
              l.hostname +
              (l.port ? ':' + l.port : '') +
              l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
              '/?/' +
              l.pathname
                .slice(1)
                .split('/')
                .slice(pathSegmentsToKeep)
                .join('/')
                .replace(/&/g, '~and~') +
              (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
              l.hash,
          );
        }
      })();
    </script>
  </head>
  <body>
    <div class="box">
      <h1>404</h1>
      <h2>Page not found</h2>
      <p>The page you were looking for doesn't exist or has moved. You'll be redirected to the homepage automatically.</p>
      <a href="/">Go to homepage</a>
    </div>
  </body>
</html>
